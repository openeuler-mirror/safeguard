# example.yml
network:
  # Enable this section before applying the network policy below.
  enable: true
  mode: block
  target: host
  cidr:
    allow:
      - 0.0.0.0/0
  domain:
    deny:
      #- example.com
      - baidu.com
  command:
    allow:
      #- systemd-resolved
      #- curl
      #- safeguard
files:
  enable: true
  mode: block
  target: host
  #allow:
    #- '/'
  deny:
    - '/etc/profile'
    #- '/etc/passwd'
process:
  enable: true
  mode: monitor
  target: host

log:
  format: json
